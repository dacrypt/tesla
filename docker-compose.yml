version: '3.8'

services:
  tesla-cli:
    build: .
    container_name: tesla-cli
    ports:
      - "${TESLA_PORT:-8080}:8080"
    volumes:
      - tesla-config:/root/.tesla-cli
    environment:
      - TESLA_VIN=${TESLA_VIN:-}
      - TESLA_RN=${TESLA_RN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tesla-config:
